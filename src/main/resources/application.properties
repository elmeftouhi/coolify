spring.application.name=coolify

# Datasource - connect to docker-compose Postgres service named 'db'
spring.datasource.url=jdbc:postgresql://db:5432/coolify-db
spring.datasource.username=coolify_user
spring.datasource.password=secretpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Reduce startup logs for embedded Tomcat
server.servlet.context-path=/
